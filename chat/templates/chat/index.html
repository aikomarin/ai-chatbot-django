<!DOCTYPE html>
<html>
<head>
    <title>Chatbot IA</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .chat-container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .messages {
            min-height: 200px;
            margin-bottom: 15px;
        }

        .user {
            text-align: right;
            color: blue;
        }

        .bot {
            text-align: left;
            color: green;
        }

        input {
            width: 70%;
            padding: 8px;
        }

        button {
            padding: 8px;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <h2>Chatbot IA</h2>

    <div class="messages">
        {% for msg in chat_history %}
            {% if msg.role == "user" %}
                <p class="user"><strong>Tú:</strong> {{ msg.content }}</p>
            {% else %}
                <p class="bot"><strong>Bot:</strong> {{ msg.content }}</p>
            {% endif %}
        {% endfor %}
    </div>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="message" placeholder="Escribe algo..." required>
        <button type="submit">Enviar</button>
    </form>
</div>

</body>
</html>
